version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "3001:3000"
    env_file:
      - .env
    networks:
      - app-network

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      - frontend
    environment:
      - PLAYWRIGHT_BASE_URL=http://frontend:3000
    ports:
      - "9323:9323"
    networks:
      - app-network

  jest:
    build:
      context: .
      dockerfile: Dockerfile.jest
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CI=true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge